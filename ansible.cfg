# ansible.cfg - Ansible configuration for Windows provisioning
# This config sets sensible defaults for WinRM-based Windows management.

[defaults]
inventory = inventory.ini
roles_path = roles
# Increase default timeout for Windows operations (updates can be slow)
timeout = 120
# Retry failed tasks up to 3 times (useful for transient WinRM issues)
retry_files_enabled = true
retry_files_save_path = .ansible-retry
# Disable host key checking for WinRM (not SSH-based)
host_key_checking = false
# Stdout callback for cleaner output
stdout_callback = yaml

[privilege_escalation]
become = false

[connection]
# Pipelining is not supported over WinRM, keep disabled
pipelining = false
