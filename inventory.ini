# inventory.ini - Target Windows hosts
#
# Usage:
#   For REMOTE provisioning via WinRM:
#     Replace "windows-pc" with your target hostname or IP.
#     Set ansible_user and ansible_password (or use ansible-vault).
#
#   For LOCAL provisioning (running Ansible on the Windows machine itself):
#     Use "localhost" with ansible_connection=local and comment out WinRM vars.
#     Note: local connection requires Ansible installed on Windows (e.g., via WSL).
#
# WinRM setup on the target is required first. See README.md for instructions.

[windows]
windows-pc

[windows:vars]
ansible_connection = winrm
ansible_port = 5986
ansible_winrm_transport = ntlm
ansible_winrm_server_cert_validation = ignore
# Set these via environment variables or ansible-vault, not in plaintext:
#   ansible_user = your_admin_user
#   ansible_password = your_admin_password
#
# To use environment variables:
#   export ANSIBLE_WINRM_USER=Administrator
#   export ANSIBLE_WINRM_PASS=YourPassword
# Then reference them:
#   ansible_user = "{{ lookup('env', 'ANSIBLE_WINRM_USER') }}"
#   ansible_password = "{{ lookup('env', 'ANSIBLE_WINRM_PASS') }}"
