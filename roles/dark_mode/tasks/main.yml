# roles/dark_mode/tasks/main.yml
# Configures Windows dark mode for both system theme and app theme.
#
# Windows dark mode is controlled by two registry values under
# HKCU:\SOFTWARE\Microsoft\Windows\CurrentVersion\Themes\Personalize:
#
#   AppsUseLightTheme  = 0  -> Apps use dark mode
#   SystemUsesLightTheme = 0 -> System chrome (taskbar, Start) uses dark mode
#
# IMPORTANT: These are HKCU (per-user) registry keys. They apply to
# whichever user account Ansible is running as (ansible_user). If you
# need dark mode for a different user, you would need to load that
# user's registry hive (NTUSER.DAT) or run as that user.
#
# A logout/login is required for all visual changes to take effect.
# Some elements (like the taskbar) may update immediately, but a full
# refresh requires re-login.

---
- name: Dark Mode | Set apps to dark theme
  ansible.windows.win_regedit:
    path: HKCU:\SOFTWARE\Microsoft\Windows\CurrentVersion\Themes\Personalize
    name: AppsUseLightTheme
    data: 0
    type: dword
    state: present
  when: enable_dark_mode | bool

- name: Dark Mode | Set system to dark theme
  ansible.windows.win_regedit:
    path: HKCU:\SOFTWARE\Microsoft\Windows\CurrentVersion\Themes\Personalize
    name: SystemUsesLightTheme
    data: 0
    type: dword
    state: present
  when: enable_dark_mode | bool

# Attempt to refresh the theme without requiring a full logout.
# This broadcasts a WM_SETTINGCHANGE message which causes some UI elements
# to update immediately. Not all elements respond to this; a logout is
# still recommended for a complete visual refresh.
- name: Dark Mode | Broadcast settings change to refresh theme
  ansible.windows.win_shell: |
    Add-Type -TypeDefinition @"
    using System;
    using System.Runtime.InteropServices;
    public class ThemeRefresh {
        [DllImport("user32.dll", SetLastError = true, CharSet = CharSet.Auto)]
        public static extern IntPtr SendMessageTimeout(
            IntPtr hWnd, uint Msg, UIntPtr wParam, string lParam,
            uint fuFlags, uint uTimeout, out UIntPtr lpdwResult);

        public static void Refresh() {
            UIntPtr result;
            // HWND_BROADCAST = 0xffff, WM_SETTINGCHANGE = 0x001A
            // SMTO_ABORTIFHUNG = 0x0002
            SendMessageTimeout(
                (IntPtr)0xffff, 0x001A, UIntPtr.Zero,
                "ImmersiveColorSet", 0x0002, 5000, out result);
        }
    }
"@
    [ThemeRefresh]::Refresh()
  when: enable_dark_mode | bool
  changed_when: false
  # This task is informational - it does not change state, it just
  # nudges the UI to pick up registry changes already made above.

- name: Dark Mode | Inform user about logout requirement
  ansible.builtin.debug:
    msg: >-
      Dark mode has been configured. Most UI elements will update after
      a logout/login. Some elements (taskbar, Start menu) may have updated
      immediately via the settings broadcast.
  when: enable_dark_mode | bool
