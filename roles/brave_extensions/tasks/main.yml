# roles/brave_extensions/tasks/main.yml
# Force-installs Brave browser extensions using Chromium enterprise policy.
#
# HOW THIS WORKS:
# Brave is Chromium-based and respects the same enterprise policies as Chrome,
# but under a different registry path:
#   HKLM:\SOFTWARE\Policies\BraveSoftware\Brave\ExtensionInstallForcelist
#
# Each registry value in this key is numbered (1, 2, 3, ...) and contains a
# string in the format:
#   <extension_id>;<update_url>
#
# The update_url for Chrome Web Store extensions is always:
#   https://clients2.google.com/service/update2/crx
#
# When Brave starts (or refreshes policy), it reads this key and silently
# installs any listed extensions. Force-installed extensions:
#   - Install without user interaction
#   - Cannot be uninstalled by the user (only by removing the policy)
#   - Auto-update through the Chrome Web Store
#
# LIMITATIONS:
#   - Extensions are installed on next Brave launch or policy refresh, not
#     instantly. If Brave is already running, it may take a few minutes
#     or require a restart of Brave.
#   - Extension-specific settings (e.g., uBlock filter lists, SponsorBlock
#     categories) must still be configured manually by the user after install.
#   - If an extension is removed from the Chrome Web Store, the policy entry
#     becomes a no-op (no error, but nothing installs).
#   - The Chromebook Recovery Utility is a Chrome App, not a standard
#     extension. It should still install via this policy, but its
#     functionality may be limited outside ChromeOS.

---
- name: Brave Extensions | Ensure Brave policy registry path exists
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\BraveSoftware\Brave\ExtensionInstallForcelist
    state: present

- name: Brave Extensions | Force-install extensions via enterprise policy
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\BraveSoftware\Brave\ExtensionInstallForcelist
    name: "{{ idx + 1 }}"
    data: "{{ item.id }};{{ brave_extension_update_url }}"
    type: string
    state: present
  loop: "{{ brave_extensions }}"
  loop_control:
    index_var: idx
    label: "{{ item.name }} ({{ item.id }})"

# Clean up stale entries if the extension list was shortened since last run.
# For example, if we previously had 12 extensions and now have 10, entries
# 11 and 12 would remain as orphans. This task removes them.
- name: Brave Extensions | Remove stale force-install entries
  ansible.windows.win_regedit:
    path: HKLM:\SOFTWARE\Policies\BraveSoftware\Brave\ExtensionInstallForcelist
    name: "{{ item }}"
    state: absent
  loop: "{{ range(brave_extensions | length + 1, brave_extensions | length + 20) | list }}"
  loop_control:
    label: "Checking entry {{ item }}"
  # We check entries beyond our list up to +20 to catch any reasonable
  # number of orphans. win_regedit is idempotent - removing a non-existent
  # value is a no-op.

- name: Brave Extensions | Summary
  ansible.builtin.debug:
    msg: >-
      Configured {{ brave_extensions | length }} extensions for force-install.
      Extensions will be installed when Brave is next launched or when
      group policy refreshes (gpupdate /force). If Brave is currently
      running, restart it to pick up the new extensions.
